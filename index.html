<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Lane Selector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0e17;
            --card-bg: #121a26;
            --gold-color: #c8aa6e;
            --gold-bright: #f0e6d2;
            --text-color: #cdbe91;
            --text-white: #ffffff;
            --success-color: #4caf50;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--gold-bright);
            text-align: center;
            border-bottom: 2px solid var(--gold-color);
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
            font-size: 24px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--gold-color);
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h3 {
            margin-top: 0;
            color: var(--gold-bright);
            font-size: 16px;
        }

        /* 押しやすく改善したメンバーリスト */
        .member-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        /* 本物のチェックボックスは隠す */
        .member-item input[type="checkbox"] {
            display: none;
        }

        /* ラベル自体を大きなボタンに変形 */
        .member-item label {
            display: block;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid #2a3545;
            color: #889ba8;
            padding: 14px 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        /* 選択されている（アクティブな）状態のスタイル */
        .member-item input[type="checkbox"]:checked+label {
            border-color: var(--gold-color);
            background: rgba(200, 170, 110, 0.15);
            color: var(--text-white);
            box-shadow: 0 0 10px rgba(200, 170, 110, 0.2);
        }

        /* ホバー時（PC用） */
        .member-item label:hover {
            border-color: #4a5a73;
            background: rgba(255, 255, 255, 0.07);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            background: linear-gradient(to bottom, #1e2830, #0f1317);
            border: 1px solid var(--gold-color);
            color: var(--gold-bright);
            padding: 15px 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--gold-color);
            color: var(--bg-color);
        }

        button:disabled {
            border-color: #444;
            color: #555;
            background: #111;
            cursor: not-allowed;
        }

        button.copied {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        #result-capture-area {
            background: #0f1622;
            border: 2px solid var(--gold-color);
            border-radius: 6px;
            padding: 20px;
            margin-top: 10px;
        }

        .result-title {
            text-align: center;
            color: var(--gold-bright);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .lane-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 15px;
            border-bottom: 1px solid rgba(200, 170, 110, 0.2);
        }

        .lane-row:last-child {
            border-bottom: none;
        }

        .lane-name {
            font-weight: bold;
            color: var(--gold-color);
            width: 100px;
            font-size: 16px;
        }

        .user-name {
            color: var(--text-white);
            font-size: 18px;
            text-align: right;
            flex-grow: 1;
            font-weight: bold;
        }

        /* 野良（空き枠）の時の薄い文字スタイル */
        .user-name.empty {
            color: #4a5a73;
            font-style: italic;
        }

        /* ベンチ枠のスタイル */
        #bench-box {
            margin-top: 15px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            border: 1px dashed #4a5a73;
            display: none;
        }

        .bench-title {
            font-size: 14px;
            color: #889ba8;
            margin: 0 0 5px 0;
        }

        .bench-members {
            color: var(--text-white);
            font-size: 15px;
        }

        .error {
            color: #ff4e4e;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>LoL Lane Selector</h1>

    <div class="container">
        <h3>本日参戦するメンバーを選択</h3>
        <div id="error-msg" class="error"></div>

        <div class="member-list" id="member-checkboxes"></div>

        <div class="btn-group">
            <button id="roll-btn" onclick="assignLanes()">レーンを決定する</button>
            <button id="copy-btn" onclick="copyResultToClipboard()" disabled>結果をコピー</button>
        </div>

        <div id="result-capture-area">
            <p class="result-title">SUMMONER'S RIFT ASSIGNMENT</p>
            <div id="result-board">
                <div class="lane-row"><span class="lane-name">TOP</span><span class="user-name" id="res-TOP">-</span>
                </div>
                <div class="lane-row"><span class="lane-name">JUG</span><span class="user-name" id="res-JUG">-</span>
                </div>
                <div class="lane-row"><span class="lane-name">MID</span><span class="user-name" id="res-MID">-</span>
                </div>
                <div class="lane-row"><span class="lane-name">ADC</span><span class="user-name" id="res-ADC">-</span>
                </div>
                <div class="lane-row"><span class="lane-name">SUP</span><span class="user-name" id="res-SUP">-</span>
                </div>
            </div>

            <!-- 6人以上の時にあぶれた人を表示するエリア -->
            <div id="bench-box">
                <p class="bench-title">SUB / BENCH</p>
                <div class="bench-members" id="res-BENCH">-</div>
            </div>
        </div>
    </div>

    <script>
        const initialMembers = ["うさうさ", "まおまお", "りくやん", "BIGHOTEL", "なんぶ", "じお", "はら"];
        const lanes = ["TOP", "JUG", "MID", "ADC", "SUP"];
        let history = {};

        // チェックボックス（隠し）と大きなボタン型ラベルを動的生成
        const checkboxContainer = document.getElementById("member-checkboxes");
        initialMembers.forEach((name, index) => {
            const div = document.createElement("div");
            div.className = "member-item";
            div.innerHTML = `
                <input type="checkbox" id="mem-${index}" value="${name}" checked>
                <label for="mem-${index}">${name}</label>
            `;
            checkboxContainer.appendChild(div);
        });

        function assignLanes() {
            const errorMsg = document.getElementById("error-msg");
            const checkedBoxes = document.querySelectorAll('#member-checkboxes input[type="checkbox"]:checked');

            // 最低でも誰か1人以上選ばれていないと虚無になるので一応バリデーション
            if (checkedBoxes.length === 0) {
                errorMsg.innerText = "メンバーを1人以上選択してください。";
                errorMsg.style.display = "block";
                return;
            }
            errorMsg.style.display = "none";

            // 選択されたプレイヤーの配列（最大7人）
            let selectedPlayers = Array.from(checkedBoxes).map(cb => cb.value);

            // シャッフル関数
            const shuffle = (array) => array.sort(() => Math.random() - 0.5);

            // プレイヤーたちをランダムに並び替える
            selectedPlayers = shuffle([...selectedPlayers]);

            // レーンに割り当てる5人（本番メンバー）と、あぶれた人（ベンチ）に分ける
            const activePlayers = selectedPlayers.slice(0, 5);
            const benchPlayers = selectedPlayers.slice(5);

            let currentAssignment = {};
            let success = false;

            // 「2連続同じレーン回避」のためのループ（本番メンバーのみを対象に抽選）
            for (let attempts = 0; attempts < 50; attempts++) {
                let shuffledLanes = shuffle([...lanes]);
                let tempAssignment = {};
                let hasViolation = false;

                // 割り当てる人数は「現在の本番メンバー数」か「5」の小さい方
                const assignCount = Math.min(activePlayers.length, 5);

                for (let i = 0; i < assignCount; i++) {
                    const player = activePlayers[i];
                    const assignedLane = shuffledLanes[i];

                    if (history[player] === assignedLane) {
                        hasViolation = true;
                        break;
                    }
                    tempAssignment[assignedLane] = player;
                }

                if (!hasViolation) {
                    currentAssignment = tempAssignment;
                    success = true;
                    break;
                }
            }

            // 万が一のセーフティ
            if (!success) {
                let shuffledLanes = shuffle([...lanes]);
                activePlayers.forEach((player, i) => {
                    if (i < 5) currentAssignment[shuffledLanes[i]] = player;
                });
            }

            // 画面（ボード）の初期化と反映
            lanes.forEach(lane => {
                const resEl = document.getElementById(`res-${lane}`);
                if (currentAssignment[lane]) {
                    const pName = currentAssignment[lane];
                    resEl.innerText = pName;
                    resEl.classList.remove("empty");
                    history[pName] = lane; // 履歴を更新
                } else {
                    // 5人に満たない場合は「野良（OPEN）」にする
                    resEl.innerText = "野良 (OPEN)";
                    resEl.classList.add("empty");
                }
            });

            // ベンチの表示設定
            const benchBox = document.getElementById("bench-box");
            if (benchPlayers.length > 0) {
                document.getElementById("res-BENCH").innerText = benchPlayers.join(", ");
                benchBox.style.display = "block";
                // ベンチに回った人は、連続回避用の前回の履歴をリセット（次回どのレーンでも行けるように）
                benchPlayers.forEach(p => delete history[p]);
            } else {
                benchBox.style.display = "none";
            }

            // コピーボタンの状態リセット
            const copyBtn = document.getElementById("copy-btn");
            copyBtn.disabled = false;
            copyBtn.innerText = "結果をコピー";
            copyBtn.classList.remove("copied");
        }

        function copyResultToClipboard() {
            const target = document.getElementById("result-capture-area");
            const copyBtn = document.getElementById("copy-btn");

            copyBtn.innerText = "コピー中...";

            html2canvas(target, {
                backgroundColor: "#0f1622",
                scale: 2
            }).then(canvas => {
                canvas.toBlob(blob => {
                    if (!blob) {
                        alert("画像の生成に失敗しました");
                        return;
                    }
                    const item = new ClipboardItem({ "image/png": blob });
                    navigator.clipboard.write([item]).then(() => {
                        copyBtn.innerText = "コピー完了！";
                        copyBtn.classList.add("copied");
                    }).catch(err => {
                        console.error("Clipboard Error:", err);
                        alert("コピーに失敗しました。");
                        copyBtn.innerText = "結果をコピー";
                    });
                }, "image/png");
            });
        }
    </script>
</body>

</html>
